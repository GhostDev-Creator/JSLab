<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JS Lab - 2</title>
    <script src="js/script2.js" defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1 class="lab-title">Laboratório de JavaScript - Parte 2</h1>

    <div class="main-container">
        <section>
            <h2>1. Adicionar valor em vetor</h2>
            <label for="numeroAddVetor">Informe um número:</label>
            <input type="number" id="numeroAddVetor" placeholder="Ex: 10">
            <button onclick="adicionarValorVetor()">Adicionar</button>
            <p id="res-1"></p>
        </section>

        <section>
            <h2>2. Remover último valor</h2>
            <label>Clique para remover o último item:</label>
            <button onclick="removerUltimoValorVetor()">Remover</button>
            <p id="res-2"></p>
        </section>

        <section>
            <h2>3. Filtrar números</h2>
            <label for="numeroFiltrarVetor">Filtrar maiores que:</label>
            <input type="number" id="numeroFiltrarVetor" />
            <button onclick="filtrarNumeroVetor()">Filtrar</button>
            <p id="res-3"></p>
        </section>

        <section>
            <h2>4. Dobrar valores do vetor</h2>
            <label>Multiplicar todos por 2:</label>
            <button onclick="dobrarValorVetor()">Calcular Dobro</button>
            <p id="res-4"></p>
        </section>

        <section>
            <h2>5. Buscar Aluno (Lista Fixa)</h2>
            <label for="campoNomeVetor">Nome do aluno:</label>
            <input type="text" id="campoNomeVetor" placeholder="Ex: Joao, Emily..." />
            <button onclick="buscarAlunoSimples()">Buscar</button>
            <p id="res-5"></p>
        </section>

        <section>
            <h2>6. Lista de Frutas (DOM)</h2>
            <label>Gerado via forEach:</label>
            <ul id="listaForEach" style="text-align: left; padding-left: 20px;"></ul>
        </section>

        <section>
            <h2>7. Soma de Números Pares</h2>
            <label>Vetor: [10, 15, 20, 25, 30]</label>
            <p id="somaNumerosVetor"></p>
        </section>

        <section>
            <h2>8. Gerenciador de Frutas</h2>
            <label>Digite frutas (sep. por vírgula):</label>
            <input type="text" id="digitarFrutas" />
            <div style="display: flex; gap: 5px;">
                <button onclick="cadastrarFrutas()" style="flex: 1;">Add</button>
                <button onclick="listarFrutas()" style="flex: 1; background-color: #34a853;">Listar</button>
            </div>
            <p id="listaDadosFrutas"></p>
        </section>
    </div>

    <footer class="paginacao">
        <div class="pagination-wrapper">
            <a href="index.html">1</a>
            <a href="index2.html" class="active">2</a>
            <a href="index3.html">3</a>
            <a href="index4.html">4</a>
            <a href="index5.html">5</a>
        </div>
    </footer>
</body>
</html>
